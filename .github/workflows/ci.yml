name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    #checkout do código
      - name: Checkout
        uses: actions/checkout@v4
    #Setup de todas dependencias do dotnet, nuget packages, runtimes, compiladores, versões etc.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
    #builda a imagem que está no docker file
      - name: Build da imagem Docker
        run: docker build -t media-escolar .
    #dotnet restore da solution raiz para restaurar as dependencias
      - name: Restaurar dependencias
        run: dotnet restore MediaEscolar.sln
    #dotnet format apenas no style, e analyzers, o format padrão vinha com uma categoria a mais(whitespace, retirado pq tudo que eu mechia quebrava a pipeline)
      - name: Analise estatica (dotnet format)
        run: |
          dotnet format style MediaEscolar.sln --verify-no-changes --report ./TestResults/format-style
          dotnet format analyzers MediaEscolar.sln --verify-no-changes --report ./TestResults/format-analyzers
    #realiza todos os testes unitários, integração e api e crie um registrador, nele coleta a cobertura de testes e expõe métricas e resultados em uma pasta /TestResults
      - name: Executar testes com cobertura
        run: dotnet test MediaEscolar.sln --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" --results-directory ./TestResults


    #USEI E ABUSEI DA IA 
    #Lógica de criar screenshot automática e gurdar como artefato, se tudo passar dentro dos conformes, um endpoint é feito e printado, caso contrário é printado a stacktrace do erro

        #parece que roda um contâiner da aplicacao e acessa os endpoints da api
      - name: Capturar screenshot da execução
        run: |
          
          docker run -d --name media-escolar -p 8080:8080 media-escolar

          echo "Aguardando a API responder..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/alunos > /dev/null; then
              echo "API respondendo."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API nao respondeu a tempo."
              docker logs media-escolar
              exit 1
            fi
            sleep 1
          done

          ALUNO_ID=$(curl -sf -X POST http://localhost:8080/alunos \
            -H "Content-Type: application/json" \
            -d '{"nome":"Maria"}' | jq -r '.id')

          curl -sf -X POST "http://localhost:8080/alunos/${ALUNO_ID}/notas" \
            -H "Content-Type: application/json" \
            -d '{"nota1":8.0,"nota2":6.0}' > /dev/null

          npx --yes playwright@1.48.0 install --with-deps chromium
          npx --yes playwright@1.48.0 screenshot "http://localhost:8080/alunos/${ALUNO_ID}" ./TestResults/screenshot-execucao.png

      - name: Encerrar container da aplicacao
        if: always()
        run: docker rm -f media-escolar || true

      - name: Publicar evidencias (relatorio do linter, resultados de teste, cobertura e screenshot)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidencias-pipeline
          path: ./TestResults
